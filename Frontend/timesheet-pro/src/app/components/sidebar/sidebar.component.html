<aside class="zsidebar" [class.collapsed]="collapsed()"
       [style.--role-color]="roleColor()">

  <!-- Logo -->
  <div class="zsidebar-logo">
    <div class="zlogo-mark"><span>T</span></div>
    @if (!collapsed()) {
      <div class="zlogo-text">
        <span class="zlogo-name">TimeSheet</span>
        <span class="zlogo-tag">Pro</span>
      </div>
    }
  </div>

  <!-- User badge -->
  @if (!collapsed()) {
    <div class="zrole-badge">
      <div class="zavatar">{{ (auth.username() ?? 'U')[0].toUpperCase() }}</div>
      <div class="zrole-info">
        <span class="zrole-name">{{ auth.username() }}</span>
        <span class="zrole-tag">{{ auth.currentRole() }}</span>
      </div>
    </div>
  }

  <!-- Nav -->
  <nav class="zsidebar-nav">
    @if (!collapsed()) {
      <p class="znav-section-label">NAVIGATION</p>
    }

    @for (item of navItems(); track item.tab) {
      <button class="znav-item"
              [class.active]="tabSvc.activeTab() === item.tab"
              (click)="select(item.tab)"
              [title]="collapsed() ? item.label : ''">
        <span class="znav-icon">{{ item.icon }}</span>
        @if (!collapsed()) {
          <span class="znav-label">{{ item.label }}</span>
        }
      </button>
    }
  </nav>

  <!-- Collapse toggle -->
  <button class="zcollapse-btn" (click)="collapsed.update(v => !v)"
          [title]="collapsed() ? 'Expand' : 'Collapse'">
    @if (collapsed()) { › } @else { ‹ }
  </button>

</aside>
